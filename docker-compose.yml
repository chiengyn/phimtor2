# Brings up MySQL plus the TMDB admin server.
#
#   cp admin/.env.example .env   # then fill in TMDB_API_KEY and ADMIN_PASSWORD
#   docker compose up -d
#
# The admin UI is then at http://localhost:8081 (Basic auth).

services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-phimtor}
      MYSQL_USER: ${DB_USER:-phimtor}
      MYSQL_PASSWORD: ${DB_PASSWORD:-phimtor}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Optional S3-compatible object storage for testing SUBTITLE_STORAGE_BACKEND=s3.
  # Off by default; start it with:  docker compose --profile s3 up -d
  # Then set in .env: SUBTITLE_STORAGE_BACKEND=s3, S3_ENDPOINT=localhost:9000,
  # S3_BUCKET=phimtor, S3_ACCESS_KEY=minioadmin, S3_SECRET_KEY=minioadmin,
  # S3_USE_SSL=false  (create the bucket once via the console at :9001).
  minio:
    image: minio/minio
    profiles: ["s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data:

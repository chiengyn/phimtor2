{{define "rows"}}{{range .}}
<section class="row">
	<h2 class="row-title"><a href="/?{{.Key}}">{{.Label}} <span class="row-chevron">›</span></a></h2>
	<div class="row-track">
		{{range .Titles}}{{template "card" .}}{{end}}
	</div>
</section>
{{else}}
<p class="empty">Chưa có phim nào.</p>
{{end}}{{end}}

{{define "head_title"}}phimnet – Xem phim lẻ, phim bộ online phụ đề tiếng Việt{{end}}
{{define "head_extra"}}
<meta name="description" content="phimnet – Xem phim lẻ và phim bộ online miễn phí, phụ đề tiếng Việt, cập nhật phim mới mỗi ngày.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{abs "/"}}">
<meta property="og:type" content="website">
<meta property="og:title" content="phimnet – Xem phim online phụ đề tiếng Việt">
<meta property="og:description" content="Xem phim lẻ và phim bộ online miễn phí, phụ đề tiếng Việt, cập nhật mỗi ngày.">
<meta property="og:url" content="{{abs "/"}}">
<script type="application/ld+json">{{siteJSONLD}}</script>
{{end}}
{{define "content"}}
<h1 class="sr-only">phimnet – Xem phim lẻ và phim bộ online phụ đề tiếng Việt</h1>
<form class="filters" method="get" action="/" role="search">
	<input class="search" type="search" name="q" placeholder="Tìm phim..." value="{{.Query}}" aria-label="Tìm phim">
	<select name="genre" aria-label="Thể loại" onchange="this.form.submit()">
		<option value="">Tất cả thể loại</option>
		{{range .Genres}}
		<option value="{{.ID}}" {{if eq .ID $.GenreID}}selected{{end}}>{{.Name}}</option>
		{{end}}
	</select>
	<select name="type" aria-label="Loại phim" onchange="this.form.submit()">
		<option value="">Tất cả</option>
		<option value="movie" {{if eq .Type "movie"}}selected{{end}}>Phim lẻ</option>
		<option value="tv" {{if eq .Type "tv"}}selected{{end}}>Phim bộ</option>
	</select>
	<button class="filter-btn" type="submit">Tìm</button>
</form>
<div id="results">{{if .Filtered}}{{template "grid" .Grid}}{{else}}{{template "rows" .Rows}}{{end}}</div>
{{end}}

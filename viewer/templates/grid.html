{{define "grid"}}{{range .}}
<a class="card" href="/titles/{{.ID}}">
	<div class="poster">
		{{$p := img "w342" .PosterPath}}
		{{if $p}}<img src="{{$p}}" alt="{{.Title}}" loading="lazy">{{else}}<div class="poster-empty">{{.Title}}</div>{{end}}
	</div>
	<div class="card-body">
		<div class="card-title">{{.Title}}</div>
		<div class="card-meta">{{with year .AirDate}}{{.}} · {{end}}{{if eq .Type "tv"}}Phim bộ{{else}}Phim lẻ{{end}}</div>
	</div>
</a>
{{else}}
<p class="empty">Không tìm thấy phim nào.</p>
{{end}}{{end}}

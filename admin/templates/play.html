<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Video.Name }} — Phát phim</title>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }

  header { background: #1a1a2e; padding: 1rem 2rem; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  header h1 { font-size: 1.25rem; color: #e94560; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header a { color: #79c0ff; font-size: 0.85rem; text-decoration: none; white-space: nowrap; }
  header a:hover { text-decoration: underline; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

  .player-pane { display: flex; flex-direction: column; gap: 1rem; }
  .plyr { width: 100%; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); --plyr-color-main: #e94560; }
  .plyr video { max-height: calc(100vh - 320px); }
  video#player { width: 100%; max-height: calc(100vh - 320px); border-radius: 8px; background: #000; }
  .status-msg { color: #888; font-size: 0.9rem; }
  .status-msg.err { color: #e94560; }

  .card { background: #16213e; border: 1px solid #2d2d4e; border-radius: 8px; padding: 1rem 1.25rem; }
  .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 0.75rem; }

  .res-badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; background: #14532d; color: #86efac; font-weight: 700; vertical-align: middle; margin-left: 0.5rem; }

  .meta-grid { display: grid; grid-template-columns: max-content 1fr; gap: 0.4rem 1rem; font-size: 0.85rem; }
  .meta-grid dt { color: #777; }
  .meta-grid dd { color: #cbd5e1; word-break: break-all; }

  .progress-bar { height: 6px; background: #2d2d4e; border-radius: 3px; overflow: hidden; margin: 0.4rem 0 0.6rem; }
  .progress-fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width 1s linear; }
  .progress-text { font-size: 0.8rem; color: #888; margin-bottom: 0.75rem; }

  .stats { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; font-size: 0.8rem; color: #888; }
  .stat { white-space: nowrap; }
  .stat b { color: #cbd5e1; font-weight: 600; }
  .stat.dl b { color: #22c55e; }
  .stat.ul b { color: #79c0ff; }
  .stat.seed b { color: #86efac; }

  .btn { cursor: pointer; border: none; border-radius: 6px; padding: 0.4rem 0.85rem; font-size: 0.85rem; font-weight: 600; }
  .btn-sub { background: #2d2d4e; color: #e0e0e0; }
  .btn-sub:hover { background: #3d3d5c; }
  .btn-sub-clear { background: transparent; color: #888; border: 1px solid #3d3d5c; }
  .btn-sub-clear:hover { color: #e94560; border-color: #e94560; }
  .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }

  .subtitle-bar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .subtitle-status { font-size: 0.8rem; color: #888; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .os-panel { margin-top: 0.85rem; display: flex; flex-direction: column; gap: 0.65rem; }
  .os-search-row { display: flex; gap: 0.5rem; }
  .os-search-row input[type="text"] { flex: 1; background: #0f0f1a; border: 1px solid #3d3d5c; border-radius: 6px; color: #e0e0e0; padding: 0.45rem 0.7rem; font-size: 0.85rem; outline: none; }
  .os-search-row input.os-lang { flex: 0 0 70px; text-align: center; }
  .os-results { display: flex; flex-direction: column; gap: 0.25rem; max-height: 240px; overflow-y: auto; }
  .os-result { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0.5rem; border-radius: 5px; cursor: pointer; font-size: 0.82rem; }
  .os-result:hover { background: #1f2a4a; }
  .os-lang-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; background: #2d2d4e; color: #c4b5fd; padding: 0.1rem 0.35rem; border-radius: 3px; flex: 0 0 auto; }
  .os-rel { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ccc; }
  .os-dl { color: #666; white-space: nowrap; }
  .loading-text { color: #666; font-style: italic; font-size: 0.85rem; }
</style>
</head>
<body
  data-streamer="{{ .StreamerURL }}"
  data-subtitles-enabled="{{ .SubtitlesEnabled }}"
  data-info-hash="{{ .Video.InfoHash }}"
  data-magnet="{{ .Video.Magnet }}"
  data-file-index="{{ .Video.FileIndex }}"
  data-file-path="{{ .Video.FilePath }}"
  data-name="{{ .Video.Name }}">
<header>
  <h1>▶ {{ .Video.Name }}</h1>
  <a href="{{ .BackURL }}">← Quay lại</a>
</header>

<div class="wrap">
  <div class="player-pane">
    <video id="player" controls playsinline></video>
    <div class="subtitle-bar">
      <label class="btn btn-sm btn-sub" for="subtitle-input">＋ Phụ đề</label>
      <input type="file" id="subtitle-input" accept=".srt,.vtt" hidden onchange="loadSubtitleFile(this.files[0]); this.value=''" />
      <button class="btn btn-sm btn-sub" id="os-btn" onclick="toggleOsPanel()" hidden>🔍 OpenSubtitles</button>
      <span id="subtitle-status" class="subtitle-status"></span>
    </div>
    <div class="os-panel" id="os-panel" hidden>
      <div class="os-search-row">
        <input type="text" id="os-query" placeholder="Từ khóa tìm kiếm…" onkeydown="if(event.key==='Enter')searchOpenSubtitles()" />
        <input type="text" class="os-lang" id="os-lang" value="vi" title="Mã ngôn ngữ, vd: en,vi" />
        <button class="btn btn-sm btn-sub" onclick="searchOpenSubtitles()">Tìm</button>
      </div>
      <div class="os-results" id="os-results"></div>
    </div>
    <div class="status-msg" id="status-msg">Đang chuẩn bị torrent…</div>
  </div>

  <div class="card">
    <h2>Số liệu trực tiếp</h2>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">Đang lấy thông tin…</div>
    <div class="stats" id="stats"><span class="loading-text">…</span></div>
  </div>

  <div class="card">
    <h2>Thông tin video<span class="res-badge">{{ .Video.Resolution }}</span></h2>
    <dl class="meta-grid">
      <dt>Tên</dt><dd>{{ .Video.Name }}</dd>
      <dt>Tệp</dt><dd>{{ .Video.FilePath }}</dd>
      <dt>Kích thước</dt><dd>{{ filesize .Video.FileSize }}</dd>
      <dt>Info hash</dt><dd>{{ .Video.InfoHash }}</dd>
    </dl>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
const D = document.body.dataset;
const STREAMER = (D.streamer || '').replace(/\/$/, '');
const SUBTITLES_ENABLED = D.subtitlesEnabled === 'true';
const INFO_HASH = D.infoHash;
const FILE_INDEX = parseInt(D.fileIndex, 10);
const FILE_PATH = D.filePath;
const VIDEO_NAME = D.name;
const API = STREAMER + '/api/torrents';
const OS_SEARCH = '/api/subtitles/search';
const OS_DL = '/api/subtitles/download';

let player = null;
let subtitleURL = null;
let osResults = [];

function setStatus(text, isErr) {
  const el = document.getElementById('status-msg');
  el.textContent = text;
  el.className = 'status-msg' + (isErr ? ' err' : '');
}

// Ensure the torrent is loaded into the streamer (idempotent — re-POSTing a
// magnet just returns the already-tracked torrent), then start playback.
async function start() {
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({magnet: D.magnet})
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
  } catch(e) {
    setStatus('Không thể thêm torrent vào streamer: ' + e.message, true);
    return;
  }

  const src = `${API}/${INFO_HASH}/files/${FILE_INDEX}/stream`;
  const video = document.getElementById('player');
  const source = document.createElement('source');
  source.src = src;
  video.appendChild(source);
  player = new Plyr('#player', { captions: { active: true, update: true }, autoplay: true });
  video.play().catch(() => {});

  setStatus('');
  if (SUBTITLES_ENABLED) document.getElementById('os-btn').hidden = false;

  refreshStats();
  setInterval(refreshStats, 3000);
}

// --- Stats ----------------------------------------------------------------

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
}
function formatSpeed(bps) { return formatBytes(bps || 0) + '/s'; }

async function refreshStats() {
  // Progress comes from the per-torrent info; speeds/peers from the stats endpoint.
  try {
    const res = await fetch(`${API}/${INFO_HASH}`);
    if (res.ok) {
      const t = await res.json();
      const pct = t.totalBytes ? Math.round(t.bytesCompleted / t.totalBytes * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = t.totalBytes
        ? `${pct}% · ${formatBytes(t.bytesCompleted)} / ${formatBytes(t.totalBytes)}`
        : 'Đang lấy thông tin metadata…';
    }
  } catch(e) { /* bỏ qua lỗi poll */ }

  try {
    const res = await fetch(`${API}/${INFO_HASH}/stats`);
    if (res.ok) document.getElementById('stats').innerHTML = statsChips(await res.json());
  } catch(e) { /* bỏ qua lỗi poll */ }
}

function statsChips(s) {
  if (!s) return '<span class="stat" style="color:#555">…</span>';
  return `
    <span class="stat dl" title="Tốc độ tải xuống">↓ <b>${formatSpeed(s.downloadSpeed)}</b></span>
    <span class="stat ul" title="Tốc độ tải lên">↑ <b>${formatSpeed(s.uploadSpeed)}</b></span>
    <span class="stat seed" title="Seeder đang kết nối">🌱 <b>${s.connectedSeeders || 0}</b></span>
    <span class="stat" title="Peer hoạt động / tổng">👥 <b>${s.activePeers || 0}</b> / ${s.totalPeers || 0}</span>
    <span class="stat" title="Peer đang chờ">⏳ ${s.pendingPeers || 0}</span>
    <span class="stat" title="Kết nối nửa mở">◐ ${s.halfOpenPeers || 0}</span>
    ${s.piecesTotal ? `<span class="stat" title="Mảnh đã hoàn thành">🧩 ${s.piecesComplete || 0}/${s.piecesTotal}</span>` : ''}`;
}

// --- Subtitles ------------------------------------------------------------

function srtToVtt(text) {
  const body = text
    .replace(/^﻿/, '')
    .replace(/\r+/g, '')
    .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
  return 'WEBVTT\n\n' + body;
}

async function loadSubtitleFile(file) {
  if (!file || !player) return;
  try {
    const text = await file.text();
    const ext = file.name.split('.').pop().toLowerCase();
    let vtt;
    if (ext === 'vtt') vtt = text.replace(/^﻿/, '');
    else if (ext === 'srt') vtt = srtToVtt(text);
    else throw new Error('định dạng không hỗ trợ (dùng .srt hoặc .vtt)');
    setSubtitle(vtt, file.name);
  } catch(e) {
    alert('Lỗi phụ đề: ' + e.message);
  }
}

function setSubtitle(vttText, label) {
  if (!player) return;
  clearSubtitle();
  subtitleURL = URL.createObjectURL(new Blob([vttText], { type: 'text/vtt' }));

  const video = document.getElementById('player');
  video.querySelectorAll('track').forEach(t => t.remove());
  const track = document.createElement('track');
  track.kind = 'captions';
  track.label = label;
  track.srclang = 'sub';
  track.src = subtitleURL;
  track.default = true;
  video.appendChild(track);

  setTimeout(() => {
    if (!player) return;
    try { player.currentTrack = 0; player.toggleCaptions(true); } catch(e) {}
  }, 150);

  const status = document.getElementById('subtitle-status');
  status.innerHTML = `${escHtml(label)} <button class="btn btn-sm btn-sub-clear" onclick="clearSubtitle(true)">✕</button>`;
}

function clearSubtitle(fromUI) {
  if (subtitleURL) { URL.revokeObjectURL(subtitleURL); subtitleURL = null; }
  if (fromUI && player) {
    const video = document.getElementById('player');
    if (video) video.querySelectorAll('track').forEach(t => t.remove());
    try { player.toggleCaptions(false); } catch(e) {}
    document.getElementById('subtitle-status').textContent = '';
  }
}

// --- OpenSubtitles --------------------------------------------------------

function toggleOsPanel(force) {
  const panel = document.getElementById('os-panel');
  const show = force !== undefined ? force : panel.hidden;
  panel.hidden = !show;
  if (show) {
    const q = document.getElementById('os-query');
    if (q && !q.value) {
      const base = (FILE_PATH.split('/').pop() || VIDEO_NAME);
      q.value = base.replace(/\.[^.]+$/, '').replace(/[._]+/g, ' ').trim();
    }
    if (q) q.focus();
  }
}

async function searchOpenSubtitles() {
  const results = document.getElementById('os-results');
  const query = document.getElementById('os-query').value.trim();
  const lang = document.getElementById('os-lang').value.trim() || 'en';
  results.innerHTML = '<span class="loading-text">Đang tìm…</span>';
  try {
    const params = new URLSearchParams({ languages: lang, file: FILE_PATH });
    if (query) params.set('query', query);
    const res = await fetch(`${OS_SEARCH}?${params}`);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
    osResults = await res.json();
    if (!osResults.length) { results.innerHTML = '<span class="loading-text">Không tìm thấy phụ đề.</span>'; return; }
    results.innerHTML = osResults.map((s, i) => `
      <div class="os-result" onclick="applyOsResult(${i})">
        <span class="os-lang-badge">${escHtml(s.language || '?')}</span>
        <span class="os-rel" title="${escHtml(s.release || '')}">${escHtml(s.release || '(không tên)')}</span>
        <span class="os-dl">⬇ ${s.downloadCount || 0}</span>
      </div>`).join('');
  } catch(e) {
    results.innerHTML = `<span class="loading-text">Lỗi: ${escHtml(e.message)}</span>`;
  }
}

async function applyOsResult(i) {
  const s = osResults[i];
  if (!s) return;
  const results = document.getElementById('os-results');
  const prev = results.innerHTML;
  results.innerHTML = '<span class="loading-text">Đang tải phụ đề…</span>';
  try {
    const res = await fetch(`${OS_DL}?file_id=${s.fileId}`);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
    const vtt = await res.text();
    setSubtitle(vtt, s.release || s.language || 'OpenSubtitles');
    toggleOsPanel(false);
    results.innerHTML = prev;
  } catch(e) {
    results.innerHTML = prev;
    alert('Tải phụ đề thất bại: ' + e.message);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

start();
</script>
</body>
</html>

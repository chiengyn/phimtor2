<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title.Title }} — phimtor2</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e1116; color: #e6edf3; line-height: 1.5;
    }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid #222b36; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    header h1 { margin: 0; font-size: 1.2rem; }
    main { max-width: 980px; margin: 0 auto; padding: 1.5rem; }
    a { color: #79c0ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #8b98a5; font-size: .85rem; }
    .hero { display: flex; gap: 1.25rem; align-items: flex-start; margin-bottom: 1.5rem; }
    .hero img { width: 120px; height: 180px; object-fit: cover; border-radius: 8px; background: #222b36; flex: none; }
    .hero h2 { margin: 0 0 .25rem; font-size: 1.4rem; }
    .badge { display: inline-block; font-size: .7rem; padding: .1rem .45rem; border-radius: 999px; background: #1f6feb33; color: #79c0ff; vertical-align: middle; }
    .badge.tv { background: #db61a233; color: #ff9bce; }
    .badge.res { background: #14532d; color: #86efac; font-weight: 700; flex: none; }
    .episode-block { border: 1px solid #222b36; border-radius: 10px; background: #11161d; padding: .85rem 1rem; margin-top: .85rem; }
    .episode-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: .5rem; }
    .episode-title { font-weight: 600; }
    .btn-add { font-size: .8rem; padding: .35rem .7rem; border-radius: 8px; background: #2563eb; color: #fff; }
    .btn-add:hover { background: #1d4ed8; text-decoration: none; }
    .torrent-row { display: flex; gap: .75rem; align-items: center; padding: .5rem 0; border-top: 1px solid #1c2530; }
    .torrent-row:first-of-type { border-top: none; }
    .torrent-meta { flex: 1; min-width: 0; }
    .torrent-name { font-weight: 600; word-break: break-word; }
    button.danger { font: inherit; padding: .4rem .7rem; border-radius: 8px; background: transparent; border: 1px solid #5a2330; color: #ff8b94; cursor: pointer; flex: none; }
    button.danger:hover { background: #2a141a; }
  </style>
</head>
<body>
  <header>
    <h1>🎬 phimtor2</h1>
    <a href="/">← Danh sách</a>
  </header>
  <main>
    <div class="hero">
      <img src="{{ imgURL .Title.PosterPath }}" alt="" onerror="this.style.visibility='hidden'">
      <div>
        <h2>{{ .Title.Title }}
          {{ if eq .Title.Type "tv" }}<span class="badge tv">Phim bộ</span>{{ else }}<span class="badge">Phim lẻ</span>{{ end }}
        </h2>
        <div class="muted">{{ year .Title.AirDate }} · TMDB #{{ .Title.TMDBID }} · db #{{ .Title.ID }}</div>
        {{ if .Title.Overview }}<p class="muted">{{ .Title.Overview }}</p>{{ end }}
      </div>
    </div>

    {{ template "torrent-region" .Title }}
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>phimtor2 — Xem phim torrent</title>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<style>
  :root { color-scheme: dark; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0e1116; color: #e6edf3; line-height: 1.5; min-height: 100vh; }

  header { padding: 1rem 1.5rem; border-bottom: 1px solid #222b36; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  header h1 { font-size: 1.2rem; }
  header a { color: #79c0ff; font-size: 0.85rem; text-decoration: none; }
  header a:hover { text-decoration: underline; }

  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 0; height: calc(100vh - 57px); }

  .sidebar { background: #0e1116; border-right: 1px solid #222b36; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }

  .card { background: #11161d; border: 1px solid #222b36; border-radius: 10px; padding: 1rem; }
  .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8b98a5; margin-bottom: 0.75rem; }

  input[type="text"], input[type="file"] { width: 100%; background: #161b22; border: 1px solid #303b48; border-radius: 8px; color: #e6edf3; padding: 0.5rem 0.75rem; font-size: 0.9rem; outline: none; }
  input[type="text"]:focus { border-color: #2563eb; }
  input[type="file"] { padding: 0.4rem; cursor: pointer; }

  .btn { cursor: pointer; border: none; border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 600; transition: background 0.15s; }
  .btn-primary { background: #2563eb; color: #fff; width: 100%; margin-top: 0.5rem; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: #555; cursor: default; }
  .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
  .btn-play { background: #16a34a; color: #fff; }
  .btn-play:hover { background: #15803d; }
  .btn-del { background: transparent; color: #ff8b94; border: 1px solid #5a2330; }
  .btn-del:hover { background: #2a141a; }

  .divider { border: none; border-top: 1px solid #222b36; }

  .torrent-item { border-bottom: 1px solid #222b36; padding: 0.75rem 0; }
  .torrent-item:last-child { border-bottom: none; }
  .torrent-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.4rem; }
  .torrent-name { font-size: 0.875rem; font-weight: 600; color: #e6edf3; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress-bar { height: 4px; background: #222b36; border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem; }
  .progress-fill { height: 100%; background: #22c55e; border-radius: 2px; transition: width 1s linear; }
  .torrent-stats { display: flex; flex-wrap: wrap; gap: 0.25rem 0.6rem; font-size: 0.72rem; color: #8b98a5; margin-bottom: 0.5rem; }
  .torrent-stats .stat { white-space: nowrap; }
  .torrent-stats .stat b { color: #cbd5e1; font-weight: 600; }
  .torrent-stats .stat.dl b { color: #22c55e; }
  .torrent-stats .stat.ul b { color: #79c0ff; }
  .torrent-stats .stat.seed b { color: #86efac; }
  .files { margin-top: 0.25rem; }
  .files > summary { cursor: pointer; font-size: 0.75rem; color: #8b98a5; list-style: none; user-select: none; padding: 0.15rem 0; }
  .files > summary::-webkit-details-marker { display: none; }
  .files > summary::before { content: "▸"; display: inline-block; margin-right: 0.4rem; transition: transform 0.15s; }
  .files[open] > summary::before { transform: rotate(90deg); }
  .file-list { display: flex; flex-direction: column; gap: 0.25rem; margin-top: 0.35rem; }
  .file-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #adbac7; }
  .file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { white-space: nowrap; color: #8b98a5; }
  .badge { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 4px; text-transform: uppercase; font-weight: 700; }
  .badge-mkv { background: #4a1d96; color: #c4b5fd; }
  .badge-mp4 { background: #14532d; color: #86efac; }
  .loading-text { color: #8b98a5; font-style: italic; font-size: 0.875rem; }

  .player-pane { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 1rem; }
  .player-pane .empty-msg { color: #8b98a5; font-size: 1rem; }
  #player-title { font-size: 0.85rem; color: #8b98a5; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  video { max-width: 100%; max-height: calc(100vh - 180px); border-radius: 8px; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
  .plyr { width: 100%; max-width: 1100px; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); --plyr-color-main: #2563eb; }
  .plyr video { max-height: calc(100vh - 180px); box-shadow: none; }

  .subtitle-bar { display: flex; align-items: center; gap: 0.75rem; width: 100%; max-width: 1100px; }
  .btn-sub { background: #21262d; color: #e6edf3; }
  .btn-sub:hover { background: #2d333b; }
  .subtitle-status { font-size: 0.8rem; color: #8b98a5; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-sub-clear { background: transparent; color: #8b98a5; border: 1px solid #303b48; }
  .btn-sub-clear:hover { color: #ff8b94; border-color: #5a2330; }

  .os-panel { width: 100%; max-width: 1100px; background: #11161d; border: 1px solid #222b36; border-radius: 10px; padding: 0.85rem; display: flex; flex-direction: column; gap: 0.65rem; }
  .os-search-row { display: flex; gap: 0.5rem; }
  .os-search-row input[type="text"] { flex: 1; }
  .os-search-row input.os-lang { flex: 0 0 70px; text-align: center; }
  .os-results { display: flex; flex-direction: column; gap: 0.25rem; max-height: 220px; overflow-y: auto; }
  .os-result { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0.5rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
  .os-result:hover { background: #1f2733; }
  .os-lang-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; background: #30363d; color: #c4b5fd; padding: 0.1rem 0.35rem; border-radius: 4px; flex: 0 0 auto; }
  .os-rel { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #adbac7; }
  .os-dl { color: #6b7681; white-space: nowrap; }

  .btn-pieces { background: #21262d; color: #adbac7; padding: 0.2rem 0.4rem; line-height: 1; }
  .btn-pieces:hover { background: #2d333b; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 1.5rem; z-index: 50; }
  .modal { background: #11161d; border: 1px solid #222b36; border-radius: 12px; width: 100%; max-width: 720px; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .modal-title { font-size: 0.95rem; font-weight: 600; color: #e6edf3; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal-close { background: transparent; border: none; color: #8b98a5; font-size: 1.2rem; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: #ff8b94; }
  .piece-map { width: 100%; height: 48px; border-radius: 6px; background: #222b36; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  .piece-summary { font-size: 0.8rem; color: #8b98a5; }
  .piece-summary b { color: #cbd5e1; font-weight: 600; }
  .piece-legend { display: flex; gap: 1rem; font-size: 0.72rem; color: #8b98a5; }
  .piece-legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
  .piece-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .legend-done { background: #22c55e; }
  .legend-partial { background: #eab308; }
  .legend-missing { background: #3a4654; }
</style>
</head>
<body data-subtitles-enabled="{{ .SubtitlesEnabled }}" data-subtitle-providers="{{ .SubtitleProviders }}" data-streamer-id="{{ .StreamerID }}">
<header>
  <h1>🎬 phimtor2 — Xem phim{{ if .StreamerID }} · <span style="color:#79c0ff">{{ .StreamerID }}</span>{{ end }}</h1>
  <span><a href="/streamers">← Streamers</a> · <a href="/">Quản trị</a></span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="card">
      <h2>Thêm torrent</h2>
      <input type="text" id="magnet-input" placeholder="Dán liên kết magnet…" />
      <button class="btn btn-primary" id="add-magnet-btn" onclick="addMagnet()">Thêm magnet</button>
      <hr class="divider" style="margin: 0.75rem 0">
      <input type="file" id="torrent-file" accept=".torrent" />
      <button class="btn btn-primary" id="add-file-btn" onclick="addTorrentFile()">Tải lên .torrent</button>
    </div>

    <div class="card">
      <h2>Torrent đang hoạt động</h2>
      <div id="torrent-list"><span class="loading-text">Chưa có torrent nào.</span></div>
    </div>
  </aside>

  <main class="player-pane" id="player-pane">
    <span class="empty-msg">Chọn một tệp để phát</span>
  </main>
</div>

<div class="modal-overlay" id="pieces-modal" hidden onclick="if(event.target===this)closePiecesModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="pieces-title"></span>
      <button class="modal-close" onclick="closePiecesModal()" title="Đóng">✕</button>
    </div>
    <canvas class="piece-map" id="pieces-canvas"></canvas>
    <div class="piece-summary" id="pieces-summary"></div>
    <div class="piece-legend">
      <span><i class="legend-done"></i> Đã tải</span>
      <span><i class="legend-partial"></i> Đang tải</span>
      <span><i class="legend-missing"></i> Chưa tải</span>
    </div>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
// Control ops (add/list/delete) go to this admin server (same origin, behind
// auth), which proxies them to the manager. The manager returns each torrent's
// owning streamer public URL (streamerByHash), which the browser uses for
// stats/stream directly. Subtitles also go to this admin server.
const SUBTITLES_ENABLED = document.body.dataset.subtitlesEnabled === 'true';
const SUB_PROVIDERS = (document.body.dataset.subtitleProviders || '').split(',').filter(Boolean);
const PROVIDER_LABELS = { opensubtitles: 'OpenSubtitles', subsource: 'SubSource' };
// Build a <select> of online subtitle providers, or '' when there's nothing to
// choose between (zero or one provider).
function providerSelectHtml(id) {
  if (SUB_PROVIDERS.length <= 1) return '';
  const opts = SUB_PROVIDERS.map(p => `<option value="${p}">${PROVIDER_LABELS[p] || p}</option>`).join('');
  return `<select class="os-lang" id="${id}">${opts}</select>`;
}
function chosenProvider(id) {
  const el = document.getElementById(id);
  return el ? el.value : (SUB_PROVIDERS[0] || '');
}
// When scoped to a streamer (?streamer=<id>), add/list target that instance
// only; otherwise they aggregate across all streamers. Delete is always by
// infohash (the manager routes it to the owning streamer).
const STREAMER_ID = document.body.dataset.streamerId || '';
const CONTROL = STREAMER_ID
  ? `/api/streamer/instances/${encodeURIComponent(STREAMER_ID)}/torrents`
  : '/api/streamer/torrents';
const DELETE_BASE = '/api/streamer/torrents';
const OS_SEARCH = '/api/subtitles/search';
const OS_DL = '/api/subtitles/download';
// infoHash -> owning streamer public base URL (from each list/add response).
const streamerByHash = {};
let currentSrc = null;
let currentVideo = null;
let player = null;
let subtitleURL = null;
let osResults = [];

async function addMagnet() {
  const input = document.getElementById('magnet-input');
  const btn = document.getElementById('add-magnet-btn');
  const magnet = input.value.trim();
  if (!magnet) return;
  btn.disabled = true;
  btn.textContent = 'Đang thêm…';
  try {
    const res = await fetch(CONTROL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({magnet})
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    input.value = '';
    await refreshTorrents();
  } catch(e) {
    alert('Lỗi: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Thêm magnet';
  }
}

async function addTorrentFile() {
  const fileInput = document.getElementById('torrent-file');
  const btn = document.getElementById('add-file-btn');
  if (!fileInput.files.length) { alert('Chọn tệp .torrent trước.'); return; }
  btn.disabled = true;
  btn.textContent = 'Đang tải lên…';
  const form = new FormData();
  form.append('torrent', fileInput.files[0]);
  try {
    const res = await fetch(CONTROL, { method: 'POST', body: form });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    fileInput.value = '';
    await refreshTorrents();
  } catch(e) {
    alert('Lỗi: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Tải lên .torrent';
  }
}

async function removeTorrent(infoHash) {
  if (!confirm('Gỡ torrent này?')) return;
  await fetch(`${DELETE_BASE}/${infoHash}`, { method: 'DELETE' });
  if (currentSrc && currentSrc.includes(infoHash)) {
    resetPlayer();
  }
  await refreshTorrents();
}

function playFile(infoHash, fileIndex, fileName) {
  const base = streamerByHash[infoHash];
  if (!base) { alert('Streamer cho torrent này chưa sẵn sàng.'); return; }
  const src = `${base}/api/torrents/${infoHash}/files/${fileIndex}/stream`;
  if (currentSrc === src) return;
  currentSrc = src;
  currentVideo = { infoHash, fileIndex, fileName };

  if (player) { player.destroy(); player = null; }
  clearSubtitle();

  const osButton = SUBTITLES_ENABLED
    ? `<button class="btn btn-sm btn-sub" onclick="toggleOsPanel()">🔍 Phụ đề online</button>`
    : '';

  const pane = document.getElementById('player-pane');
  pane.innerHTML = `
    <span id="player-title">${escHtml(fileName)}</span>
    <video id="player" controls autoplay playsinline>
      <source src="${src}" />
      Trình duyệt của bạn không hỗ trợ video HTML5.
    </video>
    <div class="subtitle-bar">
      <label class="btn btn-sm btn-sub" for="subtitle-input">＋ Phụ đề</label>
      <input type="file" id="subtitle-input" accept=".srt,.vtt" hidden onchange="loadSubtitleFile(this.files[0]); this.value=''" />
      ${osButton}
      <span id="subtitle-status" class="subtitle-status"></span>
    </div>
    <div class="os-panel" id="os-panel" hidden>
      <div class="os-search-row">
        ${providerSelectHtml('os-provider')}
        <input type="text" id="os-query" placeholder="Từ khóa tìm kiếm…" onkeydown="if(event.key==='Enter')searchOpenSubtitles()" />
        <input type="text" class="os-lang" id="os-lang" value="vi" title="Mã ngôn ngữ, vd: en,vi" />
        <button class="btn btn-sm btn-sub" onclick="searchOpenSubtitles()">Tìm</button>
      </div>
      <div class="os-results" id="os-results"></div>
    </div>
  `;

  player = new Plyr('#player', { captions: { active: true, update: true } });
}

function resetPlayer() {
  currentSrc = null;
  currentVideo = null;
  osResults = [];
  if (player) { player.destroy(); player = null; }
  clearSubtitle();
  const pane = document.getElementById('player-pane');
  pane.innerHTML = '<span class="empty-msg">Chọn một tệp để phát</span>';
}

// --- Subtitles -------------------------------------------------------------

// Convert SubRip (.srt) text to WebVTT, the only format browsers render via
// <track>. VTT differs only by a header and "." (not ",") in timestamps.
function srtToVtt(text) {
  const body = text
    .replace(/^﻿/, '')                                   // strip BOM
    .replace(/\r+/g, '')                                      // CRLF -> LF
    .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');        // 00:00:01,000 -> .000
  return 'WEBVTT\n\n' + body;
}

async function loadSubtitleFile(file) {
  if (!file || !player) return;
  try {
    const text = await file.text();
    const ext = file.name.split('.').pop().toLowerCase();
    let vtt;
    if (ext === 'vtt') vtt = text.replace(/^﻿/, '');
    else if (ext === 'srt') vtt = srtToVtt(text);
    else throw new Error('định dạng không hỗ trợ (dùng .srt hoặc .vtt)');
    setSubtitle(vtt, file.name);
  } catch(e) {
    alert('Lỗi phụ đề: ' + e.message);
  }
}

// Core entry point — also reusable for subtitles fetched remotely (e.g.
// OpenSubtitles): pass already-converted VTT text plus a display label.
function setSubtitle(vttText, label) {
  if (!player) return;
  clearSubtitle();
  subtitleURL = URL.createObjectURL(new Blob([vttText], { type: 'text/vtt' }));

  const video = document.getElementById('player');
  video.querySelectorAll('track').forEach(t => t.remove());
  const track = document.createElement('track');
  track.kind = 'captions';
  track.label = label;
  track.srclang = 'sub';
  track.src = subtitleURL;
  track.default = true;
  video.appendChild(track);

  // Plyr listens for the textTracks "addtrack" event and rebuilds its caption
  // list; give it a tick before selecting and enabling the new track.
  setTimeout(() => {
    if (!player) return;
    try { player.currentTrack = 0; player.toggleCaptions(true); } catch(e) {}
  }, 150);

  const status = document.getElementById('subtitle-status');
  if (status) {
    status.innerHTML = `${escHtml(label)} <button class="btn btn-sm btn-sub-clear" onclick="clearSubtitle(true)">✕</button>`;
  }
}

function clearSubtitle(fromUI) {
  if (subtitleURL) { URL.revokeObjectURL(subtitleURL); subtitleURL = null; }
  if (fromUI && player) {
    const video = document.getElementById('player');
    if (video) video.querySelectorAll('track').forEach(t => t.remove());
    try { player.toggleCaptions(false); } catch(e) {}
    const status = document.getElementById('subtitle-status');
    if (status) status.textContent = '';
  }
}

// --- OpenSubtitles ---------------------------------------------------------

function toggleOsPanel(force) {
  const panel = document.getElementById('os-panel');
  if (!panel) return;
  const show = force !== undefined ? force : panel.hidden;
  panel.hidden = !show;
  if (show) {
    const q = document.getElementById('os-query');
    if (q && !q.value && currentVideo) {
      q.value = currentVideo.fileName.replace(/\.[^.]+$/, '').replace(/[._]+/g, ' ').trim();
    }
    if (q) q.focus();
  }
}

async function searchOpenSubtitles() {
  if (!currentVideo) return;
  const results = document.getElementById('os-results');
  const query = document.getElementById('os-query').value.trim();
  const lang = document.getElementById('os-lang').value.trim() || 'en';
  results.innerHTML = '<span class="loading-text">Đang tìm…</span>';
  try {
    const params = new URLSearchParams({ languages: lang, file: currentVideo.fileName });
    if (query) params.set('query', query);
    const provider = chosenProvider('os-provider');
    if (provider) params.set('provider', provider);
    const res = await fetch(`${OS_SEARCH}?${params}`);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
    osResults = await res.json();
    if (!osResults.length) { results.innerHTML = '<span class="loading-text">Không tìm thấy phụ đề.</span>'; return; }
    results.innerHTML = osResults.map((s, i) => `
      <div class="os-result" onclick="applyOsResult(${i})">
        <span class="os-lang-badge">${escHtml(s.language || '?')}</span>
        <span class="os-rel" title="${escHtml(s.release || '')}">${escHtml(s.release || '(không tên)')}</span>
        <span class="os-dl">⬇ ${s.downloadCount || 0}</span>
      </div>`).join('');
  } catch(e) {
    results.innerHTML = `<span class="loading-text">Lỗi: ${escHtml(e.message)}</span>`;
  }
}

async function applyOsResult(i) {
  const s = osResults[i];
  if (!s) return;
  const results = document.getElementById('os-results');
  const prev = results.innerHTML;
  results.innerHTML = '<span class="loading-text">Đang tải phụ đề…</span>';
  try {
    const dlParams = new URLSearchParams({ file_id: s.fileId });
    if (s.provider) dlParams.set('provider', s.provider);
    const res = await fetch(`${OS_DL}?${dlParams}`);
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
    const vtt = await res.text();
    setSubtitle(vtt, s.release || s.language || 'Phụ đề');
    toggleOsPanel(false);
    results.innerHTML = prev;
  } catch(e) {
    results.innerHTML = prev;
    alert('Tải phụ đề thất bại: ' + e.message);
  }
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
}

function formatSpeed(bytesPerSec) {
  return formatBytes(bytesPerSec || 0) + '/s';
}

// Số liệu trực tiếp của từng torrent, lấy từ endpoint stats riêng (tách khỏi
// danh sách torrent) và lưu cache theo infoHash để khi danh sách render lại
// không bị mất chip giữa các lần poll.
const statsCache = {};

function statsChips(s) {
  if (!s) return '<span class="stat" style="color:#6b7681">…</span>';
  return `
    <span class="stat dl" title="Tốc độ tải xuống">↓ <b>${formatSpeed(s.downloadSpeed)}</b></span>
    <span class="stat ul" title="Tốc độ tải lên">↑ <b>${formatSpeed(s.uploadSpeed)}</b></span>
    <span class="stat seed" title="Seeder đang kết nối">🌱 <b>${s.connectedSeeders || 0}</b></span>
    <span class="stat" title="Peer hoạt động / tổng">👥 <b>${s.activePeers || 0}</b> / ${s.totalPeers || 0}</span>
    <span class="stat" title="Peer đang chờ">⏳ ${s.pendingPeers || 0}</span>
    <span class="stat" title="Kết nối nửa mở">◐ ${s.halfOpenPeers || 0}</span>
    ${s.piecesTotal ? `<span class="stat" title="Mảnh đã hoàn thành">🧩 ${s.piecesComplete || 0}/${s.piecesTotal}</span>` : ''}`;
}

async function refreshStats(infoHashes) {
  await Promise.all(infoHashes.map(async hash => {
    const base = streamerByHash[hash];
    if (!base) return;
    try {
      const res = await fetch(`${base}/api/torrents/${hash}/stats`);
      if (!res.ok) return;
      const s = await res.json();
      statsCache[hash] = s;
      const el = document.getElementById('stats-' + hash);
      if (el) el.innerHTML = statsChips(s);
    } catch(e) { /* bỏ qua lỗi poll */ }
  }));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getExtBadge(path) {
  const ext = path.split('.').pop().toLowerCase();
  const cls = ['mp4','m4v'].includes(ext) ? 'badge-mp4' : 'badge-mkv';
  return `<span class="badge ${cls}">${escHtml(ext)}</span>`;
}

// Which torrents have their file list expanded. The list re-renders every poll,
// so we track open state by infoHash to preserve it across rebuilds (collapsed
// by default). A delegated 'toggle' listener (capture phase — toggle doesn't
// bubble) keeps the set in sync with user clicks.
const expandedFiles = new Set();
document.getElementById('torrent-list').addEventListener('toggle', (e) => {
  const d = e.target;
  if (!(d instanceof HTMLElement) || !d.matches('details.files')) return;
  const hash = d.dataset.hash;
  if (!hash) return;
  if (d.open) expandedFiles.add(hash); else expandedFiles.delete(hash);
}, true);

function renderTorrents(torrents) {
  const container = document.getElementById('torrent-list');
  if (!torrents || torrents.length === 0) {
    container.innerHTML = '<span class="loading-text">Chưa có torrent nào.</span>';
    return;
  }

  // The server returns torrents in non-deterministic (map) order, which would
  // reshuffle the list on every poll. Sort by infoHash (stable — it never
  // changes, unlike name which starts as a placeholder) for a steady order.
  const sorted = [...torrents].sort((a, b) => (a.infoHash || '').localeCompare(b.infoHash || ''));

  container.innerHTML = sorted.map(t => {
    // Record the owning streamer so play/stats can hit it directly.
    if (t.streamerPublicURL) streamerByHash[t.infoHash] = t.streamerPublicURL.replace(/\/$/, '');
    const pct = t.totalBytes ? Math.round(t.bytesCompleted / t.totalBytes * 100) : 0;
    const files = (t.files || []).map((f, i) => {
      const playBtn = f.isVideo
        ? `<button class="btn btn-sm btn-play" onclick="playFile('${escHtml(t.infoHash)}', ${f.index}, '${escHtml(f.path).replace(/'/g,"\\'")}')">▶</button>`
        : `<button class="btn btn-sm" style="background:#21262d;color:#6b7681;cursor:default" disabled>▶</button>`;
      const fileName = f.path.split('/').pop();
      return `<div class="file-row">
        ${playBtn}
        <span class="file-name" title="${escHtml(f.path)}">${escHtml(fileName)}</span>
        ${getExtBadge(f.path)}
        <span class="file-size">${formatBytes(f.length)}</span>
        <button class="btn btn-sm btn-pieces" title="Xem mảnh đã tải"
          onclick="openPiecesModal('${escHtml(t.infoHash)}', ${f.index}, '${escHtml(fileName).replace(/'/g,"\\'")}')">🧩</button>
      </div>`;
    }).join('');

    return `<div class="torrent-item">
      <div class="torrent-header">
        <span class="torrent-name" title="${escHtml(t.name)}">${escHtml(t.name)}</span>
        <button class="btn btn-sm btn-del" onclick="removeTorrent('${escHtml(t.infoHash)}')">✕</button>
      </div>
      ${t.totalBytes ? `
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:0.75rem;color:#8b98a5;margin-bottom:0.4rem">${pct}% · ${formatBytes(t.bytesCompleted)} / ${formatBytes(t.totalBytes)}</div>
      ` : '<div style="font-size:0.75rem;color:#8b98a5;margin-bottom:0.4rem">Đang lấy thông tin…</div>'}
      <div class="torrent-stats" id="stats-${escHtml(t.infoHash)}">${statsChips(statsCache[t.infoHash])}</div>
      ${(t.files || []).length ? `
        <details class="files" data-hash="${escHtml(t.infoHash)}"${expandedFiles.has(t.infoHash) ? ' open' : ''}>
          <summary>${t.files.length} tệp</summary>
          <div class="file-list">${files}</div>
        </details>
      ` : ''}
    </div>`;
  }).join('');
}

async function refreshTorrents() {
  try {
    const res = await fetch(CONTROL);
    if (!res.ok) return;
    const data = await res.json();
    renderTorrents(data);
    refreshStats((data || []).map(t => t.infoHash));
  } catch(e) {
    // silently ignore polling errors
  }
}

// --- Piece map -------------------------------------------------------------

// The pieces modal polls the owning streamer's per-file pieces endpoint (public,
// like stats) and draws a piece map on a canvas. The canvas backing store is one
// pixel per piece — CSS stretches it to width with pixelated scaling — so even a
// file of thousands of pieces redraws cheaply each poll.
let piecesModal = { infoHash: null, fileIndex: null, timer: null };

function openPiecesModal(infoHash, fileIndex, fileName) {
  const base = streamerByHash[infoHash];
  if (!base) { alert('Streamer cho torrent này chưa sẵn sàng.'); return; }
  piecesModal.infoHash = infoHash;
  piecesModal.fileIndex = fileIndex;
  document.getElementById('pieces-title').textContent = fileName;
  document.getElementById('pieces-summary').textContent = 'Đang tải…';
  const canvas = document.getElementById('pieces-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('pieces-modal').hidden = false;
  refreshPieces();
  clearInterval(piecesModal.timer);
  piecesModal.timer = setInterval(refreshPieces, 1500);
}

function closePiecesModal() {
  clearInterval(piecesModal.timer);
  piecesModal.timer = null;
  piecesModal.infoHash = null;
  document.getElementById('pieces-modal').hidden = true;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !document.getElementById('pieces-modal').hidden) closePiecesModal();
});

async function refreshPieces() {
  const { infoHash, fileIndex } = piecesModal;
  if (infoHash === null) return;
  const base = streamerByHash[infoHash];
  if (!base) return;
  try {
    const res = await fetch(`${base}/api/torrents/${infoHash}/files/${fileIndex}/pieces`);
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || res.statusText);
    }
    const p = await res.json();
    // A late poll from a modal the user already closed/switched must not draw.
    if (piecesModal.infoHash !== infoHash || piecesModal.fileIndex !== fileIndex) return;
    drawPieceMap(p.pieces || '');
    const pct = p.numPieces ? Math.round(p.piecesComplete / p.numPieces * 100) : 0;
    document.getElementById('pieces-summary').innerHTML =
      `<b>${p.piecesComplete || 0}</b> / ${p.numPieces || 0} mảnh (${pct}%) · mỗi mảnh ${formatBytes(p.pieceLength)}`;
  } catch(e) {
    document.getElementById('pieces-summary').textContent = 'Lỗi: ' + e.message;
  }
}

function drawPieceMap(pieces) {
  const canvas = document.getElementById('pieces-canvas');
  const n = pieces.length;
  if (!n) { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); return; }
  canvas.width = n;
  canvas.height = 1;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(n, 1);
  for (let i = 0; i < n; i++) {
    let r, g, b;
    switch (pieces[i]) {
      case '2': r = 34;  g = 197; b = 94;  break; // complete
      case '1': r = 234; g = 179; b = 8;   break; // partial
      default:  r = 58;  g = 70;  b = 84;         // missing
    }
    const o = i * 4;
    img.data[o] = r; img.data[o+1] = g; img.data[o+2] = b; img.data[o+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

// Poll every 3 seconds
refreshTorrents();
setInterval(refreshTorrents, 3000);
</script>
</body>
</html>

# Kamal deploy — STREAMER (torrent streaming API + ffmpeg transcode).
#
# This base config IS streamer instance 1:
#   kamal deploy -c config/deploy.streamer.yml
#
# Additional instances are Kamal **destinations** (one image, distinct
# container/host/volume), so the image's `service=phimtor2-streamer` label still
# matches. Each destination file (e.g. config/deploy.streamer.s2.yml) overrides
# only the per-instance bits and deploys with:
#   kamal deploy -c config/deploy.streamer.yml -d s2
#
# Each streamer self-registers with the manager (MANAGER_URL) advertising its
# internal alias + public host; the manager load-balances and routes by owner.
# The browser hits the PUBLIC host directly for stats/stream; the control routes
# (add/list/get/delete) are token-gated and only the manager calls them. No MySQL.

service: phimtor2-streamer
image: chiengyn/phimtor2-streamer

servers:
  web:
    hosts:
      - <%= ENV["SERVER_IP"] %>
    options:
      # Stable DNS alias on the kamal network — the streamer advertises this to
      # the manager so it can reach the control routes server-to-server.
      network-alias: phimtor2-streamer

proxy:
  ssl: true
  host: <%= ENV["STREAMER1_HOST"] %>   # browser-reachable (direct stats/stream)
  app_port: 8080
  healthcheck:
    path: /up
  # Streaming serves large, long-lived ranged responses; kamal-proxy buffers by
  # default which stalls a <video> open-ended range. Stream responses and raise
  # the response timeout for long playback.
  response_timeout: 3600
  buffering:
    responses: false

registry:
  server: ghcr.io
  username: chiengyn
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ./streamer

env:
  clear:
    PORT: 8080
    DATA_DIR: /data
    READAHEAD_MB: 16
    # download-all banks each torrent to disk in full while its swarm is still
    # alive (swarms decay over a long watch), deleting already-watched pieces to
    # reclaim space. Peak disk per torrent is the full file size — watch the
    # /data volume. CACHE_MB only applies to prefix-cache; kept for rollback.
    STORAGE_MODE: download-all
    KEEP_BEHIND_MB: 256
    PREFIX_MB: 32
    CACHE_MB: 2048
    MAX_CONNS: 50
    IDLE_TTL_MIN: 20
    RETAIN_HOT: false
    # 0 = disable the library's global cross-torrent unverified-bytes cap so one
    # stalled torrent can't starve the others of piece requests.
    MAX_UNVERIFIED_MB: 0
    # Drop a torrent a viewer is waiting on that downloads nothing with no seeders
    # for this many seconds (dead swarm), freeing its peer slot + reader. 0 disables.
    # Disabled for now: dropping a torrent under a blocked reader hits an
    # anacrolix/torrent infinite-recursion bug (reader.readAt retries "torrent
    # closed" forever when storage reports a capacity) that stack-overflows the
    # whole process. Restore 120 once the image with the patched fork
    # (github.com/chiengyn/torrent) is deployed — the patch makes the drop safe.
    STALL_TIMEOUT_SEC: 0
    # --- Manager registration ---
    STREAMER_INSTANCE_ID: streamer-1
    MANAGER_URL: http://phimtor2-manager:8083
    STREAMER_ADVERTISE_INTERNAL_URL: http://phimtor2-streamer:8080
    STREAMER_ADVERTISE_PUBLIC_URL: https://<%= ENV["STREAMER1_HOST"] %>
  secret:
    # Shared join token for self-registration (must match the manager's
    # MANAGER_REGISTER_TOKEN). This streamer's control-plane credential is its own
    # self-generated identity token, persisted at /data/identity and pinned by the
    # manager on approval — not configured here.
    - MANAGER_REGISTER_TOKEN

# Torrent cache (prefix tier persisted, cache tier wiped on startup) AND the
# persisted /data/identity token. Each instance needs its OWN volume — keeping it
# stable across deploys preserves this streamer's manager approval. Destinations
# override this so they never share.
volumes:
  - "phimtor2_streamer_data:/data"

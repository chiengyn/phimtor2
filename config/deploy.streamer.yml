# Kamal deploy — STREAMER service (torrent streaming API + ffmpeg transcode).
#
#   kamal deploy -c config/deploy.streamer.yml
#
# Standalone: no MySQL, no secrets. The admin watch page and the viewer call it
# (cross-origin from the browser for stats/stream; the viewer also adds torrents
# server-to-server over the kamal network as http://phimtor2-streamer:8080).

service: phimtor2-streamer
image: chiengyn/phimtor2-streamer

servers:
  web:
    hosts:
      - <%= ENV["SERVER_IP"] %>   # same host as admin/viewer
    options:
      # Stable DNS alias on the kamal network so the viewer can reach the streamer
      # at http://phimtor2-streamer:8080 server-to-server. The real container name
      # is phimtor2-streamer-web-<version> and changes every deploy, so without
      # this alias the lookup fails (dial tcp: lookup phimtor2-streamer ...).
      network-alias: phimtor2-streamer

proxy:
  ssl: true
  host: <%= ENV["STREAMER_HOST"] %>   # must be browser-reachable (CORS API)
  app_port: 8080
  healthcheck:
    path: /up
  # Streaming serves large, long-lived ranged responses. kamal-proxy streams
  # responses by default; if you hit cut-offs on long downloads, raise the
  # response timeout (default 30s):
  #   response_timeout: 300
  # and on recent Kamal you can also disable buffering:
  #   buffering:
  #     responses: false

registry:
  server: ghcr.io
  username: chiengyn
  password:
    - KAMAL_REGISTRY_PASSWORD

# Images are built+pushed to GHCR by CI; deploys pull them via
# `kamal deploy -c config/deploy.streamer.yml --skip-push`. Builder is a local
# fallback only (see DEPLOY.md).
builder:
  arch: amd64
  context: ./streamer

env:
  clear:
    PORT: 8080
    DATA_DIR: /data
    READAHEAD_MB: 16
    STORAGE_MODE: prefix-cache
    PREFIX_MB: 32
    # CACHE_MB is a DISK budget for the cache tier (blob files under /data/cache),
    # not RAM. It must be large enough that the torrent can download ahead of the
    # player without evicting upcoming pieces (too small => "open /data/cache/...:
    # no such file" read errors and stalled playback). 2 GB fits the 21 GB disk.
    CACHE_MB: 2048

# Torrent cache (prefix tier persisted, cache tier wiped on startup).
volumes:
  - "phimtor2_streamer_data:/data"

# Kamal deploy — MANAGER service (streamer control plane).
#
#   kamal deploy -c config/deploy.manager.yml
#
# Publicly reachable at $MANAGER_HOST so streamers on OTHER servers can register
# and the manager can be reached cross-host. Every route is bearer-token gated
# (register / internal tokens), so public exposure is safe as long as the tokens
# stay secret. It ALSO keeps its kamal-network alias, so same-host admin/viewer
# and local streamers keep using the faster internal URL http://phimtor2-manager:8083
# (only remote streamers need the public https host). Holds no DB, but DOES persist
# the streamer enrollment allow-list to a small volume (so approvals survive deploys).
#
# Requires a DNS record: $MANAGER_HOST → the host. kamal-proxy issues the TLS cert
# via Let's Encrypt, so the record must exist BEFORE public HTTPS works (the deploy
# itself health-checks the container directly and succeeds without it).

service: phimtor2-manager
image: chiengyn/phimtor2-manager

servers:
  web:
    hosts:
      - <%= ENV["SERVER_IP"] %>   # same host as the rest (for now)
    options:
      # Stable DNS alias on the kamal network so same-host admin/viewer/streamers
      # resolve it by name (the real container name changes every deploy).
      network-alias: phimtor2-manager

proxy:
  ssl: true
  host: <%= ENV["MANAGER_HOST"] %>   # e.g. manager.phimnet.online (needs DNS)
  app_port: 8083
  healthcheck:
    path: /up   # token-free liveness route

registry:
  server: ghcr.io
  username: chiengyn
  password:
    - KAMAL_REGISTRY_PASSWORD

# Images are built+pushed to GHCR by CI; deploys pull them via
# `kamal deploy -c config/deploy.manager.yml --skip-push`.
builder:
  arch: amd64
  context: ./manager

env:
  clear:
    MANAGER_PORT: 8083
    MANAGER_LB_STRATEGY: least-torrents
    MANAGER_HEARTBEAT_TTL: 30
    MANAGER_STATE_DIR: /data   # enrollment allow-list lives here (see volumes below)
  secret:
    # MANAGER_REGISTER_TOKEN: shared join token streamers present at /register
    # (anti-spam gate; each streamer's identity is its own self-generated token,
    # pinned on approval). MANAGER_INTERNAL_TOKEN: gates the control routes the
    # manager exposes to admin/viewer. (No manager→streamer secret anymore.)
    - MANAGER_REGISTER_TOKEN
    - MANAGER_INTERNAL_TOKEN

# Persist the streamer enrollment allow-list (<MANAGER_STATE_DIR>/enrollments.json)
# so operator approvals survive redeploys.
volumes:
  - "phimtor2_manager_data:/data"
